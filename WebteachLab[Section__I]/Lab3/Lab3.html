<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Lab3.css">
    <title>Pental Shop - Lab 3</title>
</head>

<body>

    <div class="container">

        <h1 class="firstheading">
            Welcome to Pental Shop
            <span>Lab-3</span>
        </h1>

        <h2 class="about">About This Lab</h2>

        <p class="about">
            In this lab, you will learn basic HTML structure,
            formatting text, creating simple tables and using
            forms for input.
        </p>

      
        <table class="inventory">

            <tr id="deepblue">
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
            </tr>

            <tr class="cyan">
                <td>Pencils</td>
                <td>100</td>
                <td>In Stock</td>
            </tr>

            <tr class="cyan">
                <td>Notebooks</td>
                <td>50</td>
                <td>Low Stock</td>
            </tr>

            <tr class="cyan">
                <td>Markers</td>
                <td>15</td>
                <td>In Stock</td>
            </tr>

        </table>


        <div id="info">

            <h2 class="firstheading">
                Contact Information
            </h2>

            <form>

<div class="form-row">
    <label>Name</label>
    <input type="text" >
</div>

<div class="form-row">
    <label>Email</label>
    <input type="email" >
</div>

<div class="form-row">
    <label>Message</label>
    <textarea rows="4"></textarea>
</div>

<button type="submit">
    Submit
</button>

</form>
        </div>

    </div>

</body>

</html>
